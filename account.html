<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حسابي - My Garage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8fafc;
    color:#0f172a;
}

/* navbar */

.navbar{
    background:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo{
    width:150px;
}

/* page */

.page{
    width:90%;
    max-width:1100px;
    margin:40px auto;
}

/* card */

.account-card{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* top */

.top-section{
    background:
    linear-gradient(rgba(7,17,31,.85),rgba(7,17,31,.85)),
    url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600");

    background-size:cover;
    background-position:center;

    padding:50px 30px;
    text-align:center;
    color:white;
}

.profile-circle{
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    color:#dc2626;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:45px;
    margin:auto;
    margin-bottom:18px;
    font-weight:bold;
}

.top-section h1{
    margin:0;
    font-size:35px;
}

.top-section p{
    margin-top:10px;
    color:#e5e7eb;
}

/* info */

.info-section{
    padding:35px;
}

.section-title{
    font-size:28px;
    margin-bottom:25px;
}

.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.info-box{
    background:#f8fafc;
    padding:22px;
    border-radius:16px;
    border:1px solid #e5e7eb;
}

.label{
    color:#6b7280;
    font-size:14px;
    margin-bottom:10px;
}

.value{
    font-size:20px;
    font-weight:bold;
}

/* buttons */

.buttons{
    margin-top:35px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:14px 25px;
    border-radius:12px;
    font-weight:bold;
    transition:.2s;
}

.home-btn{
    background:#dc2626;
    color:white;
}

.logout-btn{
    background:#07111f;
    color:white;
}

.btn:hover{
    transform:translateY(-2px);
}

/* mobile */

@media(max-width:800px){

.info-grid{
    grid-template-columns:1fr;
}

.logo{
    width:120px;
}

.top-section h1{
    font-size:28px;
}

}

</style>
</head>

<body>

<!-- navbar -->

<div class="navbar">
    <img src="logo.png" class="logo">

    <div>
        <a href="index.html"
        style="text-decoration:none;
        color:#111827;
        font-weight:bold;">
        الرئيسية
        </a>
    </div>
</div>

<!-- page -->

<div class="page">

<div class="account-card">

    <!-- top -->

    <div class="top-section">

        <div class="profile-circle">
            👤
        </div>

        <h1>حسابك</h1>

        <p>
            إدارة معلومات حسابك في My Garage
        </p>

    </div>

    <!-- info -->

    <div class="info-section">

        <h2 class="section-title">
            المعلومات الشخصية
        </h2>

        <div class="info-grid">

            <div class="info-box">
                <div class="label">الاسم</div>
                <div class="value" id="name">
                    Alhanoof
                </div>
            </div>

            <div class="info-box">
                <div class="label">رقم الهاتف</div>
                <div class="value" id="phone">
                    +973 33112244
                </div>
            </div>

            <div class="info-box">
                <div class="label">البريد الإلكتروني</div>
                <div class="value" id="email">
                    example@gmail.com
                </div>
            </div>

            <div class="info-box">
                <div class="label">عدد الحجوزات</div>
                <div class="value">
                    5 حجوزات
                </div>
            </div>

        </div>

        <div class="buttons">

            <a href="mybookings.html"
            class="btn home-btn">
            حجوزاتي
            </a>

            <a href="#"
            onclick="logout()"
            class="btn logout-btn">
            تسجيل خروج
            </a>

        </div>

    </div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase.js"></script>

<script>

auth.onAuthStateChanged(function(user){

    if(user){

        document.getElementById("email").innerText =
        user.email;

    } else {

        window.location.href = "login.html";
    }

});

function logout(){

    auth.signOut().then(() => {

        window.location.href = "index.html";

    });

}

</script>

</body>
</html>
