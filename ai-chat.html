<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Garage Assistant</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
direction:rtl;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.chat-container{

width:90%;
max-width:700px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.1);

border-radius:25px;

padding:25px;

box-shadow:0 0 30px rgba(0,0,0,0.3);

}

.title{

font-size:30px;
font-weight:bold;
color:white;
margin-bottom:20px;

}

#chat-box{

height:400px;

overflow-y:auto;

padding:15px;

border-radius:15px;

background:#111827;

margin-bottom:20px;

}

.user{

background:#d90429;

color:white;

padding:12px;

border-radius:15px;

margin:10px 0;

}

.ai{

background:#1a2238;

color:white;

padding:12px;

border-radius:15px;

margin:10px 0;

}

.input-area{

display:flex;

gap:10px;

}

input{

flex:1;

padding:15px;

border:none;

border-radius:15px;

background:#111827;

color:white;

font-size:16px;

}

button{

background:linear-gradient(135deg,#d90429,#ef233c);

border:none;

padding:15px 25px;

border-radius:15px;

color:white;

font-weight:bold;

cursor:pointer;

}

</style>

</head>

<body>

<div class="chat-container">

<div class="title">
🤖 Smart Garage Assistant
</div>

<div id="chat-box"></div>

<div class="input-area">

<input id="userInput" placeholder="اكتب مشكلة سيارتك">

<button onclick="sendMessage()">
إرسال
</button>

</div>

</div>

</body>

</html>
