<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<title>Booking - My Garage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: #f8f9fa;

    color: #0f172a;

}

.navbar {

    background: white;

    padding: 18px 40px;

    display: flex;

    justify-content: space-between;

    align-items: center;

    box-shadow: 0 2px 8px rgba(0,0,0,.08);

    direction: ltr;

}

.logo {

    width: 150px;

}

.nav-links a {

    text-decoration: none;

    color: #111827;

    margin: 0 12px;

    font-weight: bold;

}

.book-top-btn {

    background: #dc2626;

    color: white !important;

    padding: 12px 20px;

    border-radius: 10px;

}

.page-title {

    text-align: center;

    margin: 35px 0 10px;

}

.breadcrumb {

    text-align: center;

    color: #6b7280;

    margin-bottom: 25px;

}

.container {

    display: grid;

    grid-template-columns: 2fr 1fr;

    gap: 25px;

    width: 88%;

    max-width: 1200px;

    margin: auto;

}

.card {

    background: white;

    border-radius: 18px;

    box-shadow: 0 8px 25px rgba(0,0,0,.08);

    padding: 25px;

}

.form-title {

    margin-bottom: 25px;

    font-size: 28px;

}

.form-grid {

    display: grid;

    grid-template-columns: 1fr 1fr;

    gap: 18px;

}

.form-group {

    text-align: right;

}

label {

    display: block;

    margin-bottom: 8px;

    font-weight: bold;

}

input, select, textarea {

    width: 100%;

    box-sizing: border-box;

    padding: 13px;

    border: 1px solid #d1d5db;

    border-radius: 10px;

    font-size: 15px;

    background: white;

}

textarea {

    min-height: 90px;

    resize: vertical;

}

.full {

    grid-column: 1 / 3;

}

.buttons {

    margin-top: 25px;

    display: flex;

    justify-content: space-between;

    gap: 15px;

}

button, .back-btn {

    border: none;

    padding: 13px 25px;

    border-radius: 10px;

    font-size: 16px;

    cursor: pointer;

    text-decoration: none;

}

.next-btn {

    background: #dc2626;

    color: white;

}

.back-btn {

    background: #f3f4f6;

    color: #111827;

}

.summary-img {

    width: 100%;

    height: 130px;

    object-fit: cover;

    border-radius: 12px;

    margin-bottom: 15px;

}

.summary-title {

    font-size: 22px;

    margin-bottom: 8px;

    font-weight: bold;

}

.summary-row {

    display: flex;

    justify-content: space-between;

    border-bottom: 1px solid #eee;

    padding: 12px 0;

    gap: 10px;

}


#msg {

    margin-top: 15px;

    color: #dc2626;

    font-weight: bold;

}

@media(max-width: 900px) {

    .container {

        grid-template-columns: 1fr;

    }

    .form-grid {

        grid-template-columns: 1fr;

    }

    .full {

        grid-column: 1;

    }

    .nav-links {

        display: none;

    }

    .logo {

        width: 120px;

    }

}
</style>
</head>
<body>
<div class="navbar">
<img src="logo.png" class="logo">
<div class="nav-links">
<a href="index.html">الرئيسية</a>
<a href="index.html#garages">الكراجات</a>
<a href="index.html#about">من نحن</a>
<a href="index.html#contact">اتصل بنا</a>
<a href="index.html#garages" class="book-top-btn">احجز خدمة الآن</a>
</div>
</div>
<h1 class="page-title">حجز خدمة</h1>
<div class="breadcrumb">

    الرئيسية › الكراجات › <span id="breadcrumbGarage">الكراج</span> › حجز خدمة
</div>
<div class="container">
<div class="card">
<h2 class="form-title">تفاصيل الحجز</h2>
<div class="form-grid">
<div class="form-group">
<label>نوع الخدمة *</label>
<select id="serviceType" onchange="updateSummary()">
<option value="تغيير زيت + فلتر">تغيير زيت + فلتر</option>
<option value="تصليح عام">تصليح عام</option>
<option value="فحص كمبيوتر">فحص كمبيوتر</option>
<option value="كهرباء سيارات">كهرباء سيارات</option>
<option value="مكيف سيارات">مكيف سيارات</option>
</select>
</div>
<div class="form-group">
<label>المركبة *</label>
<input type="text" id="carType" placeholder="مثال: Toyota Camry - 2020" oninput="updateSummary()">
</div>
<div class="form-group">
<label>رقم اللوحة *</label>
<input type="text" id="plateNumber" placeholder="مثال: 123456" oninput="updateSummary()">
</div>
<div class="form-group">
<label>التاريخ *</label>
<input type="date" id="date" onchange="checkDateAndLoadTimes()">
</div>
<div class="form-group">
<label>الوقت *</label>
<select id="time" onchange="updateSummary()">
<option value="">اختاري الوقت</option>
</select>
</div>
<div class="form-group">
<label>رقم الهاتف *</label>
<input type="tel" id="phone" placeholder="مثال: 33112244" oninput="updateSummary()">
</div>
<div class="form-group full">
<label>ملاحظات إضافية</label>
<textarea id="notes" placeholder="اكتبي أي ملاحظات عن مشكلة السيارة..." oninput="updateSummary()"></textarea>
</div>
</div>
<div class="buttons">
<a href="index.html" class="back-btn">رجوع</a>
<button class="next-btn" onclick="confirmBooking()">تأكيد الحجز</button>
</div>
<p id="msg"></p>
</div>
<div class="card">
<h3>ملخص الحجز</h3>
<img id="garageImage" class="summary-img" src="garage-bg.jpeg">
<div class="summary-title" id="summaryGarage">Garage</div>
<div class="summary-row">
<span>نوع الخدمة</span>
<b id="summaryService">تغيير زيت + فلتر</b>
</div>
<div class="summary-row">
<span>المركبة</span>
<b id="summaryCar">-</b>
</div>
<div class="summary-row">
<span>رقم اللوحة</span>
<b id="summaryPlate">-</b>
</div>
<div class="summary-row">
<span>التاريخ</span>
<b id="summaryDate">-</b>
</div>
<div class="summary-row">
<span>الوقت</span>
<b id="summaryTime">-</b>
</div>
<div class="summary-row">
<span>رقم الهاتف</span>
<b id="summaryPhone">-</b>
</div>
<div class="summary-row">
<span>الملاحظات</span>
<b id="summaryNotes">-</b>
</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase.js"></script>
<script>

let garage = localStorage.getItem("garage") || "Not selected";

let garageImages = {

    "Blue Motors Auto Services": "images(blue-motor).jpeg",

    "BOSCH Service": "images(BOSCH-Service).jpeg",

    "HOMS GATE": "images(HOMS-GATE).jpeg",

    "Fit and Fix": "images(Fit-and-fix).jpeg"

};

let garageTimes = {

    "Blue Motors Auto Services": [

        "08:00", "09:00", "10:00", "11:00", "12:00",

        "15:00", "16:00", "17:00"

    ],

    "BOSCH Service": [

        "08:00", "09:00", "10:00", "11:00", "12:00",

        "13:00", "14:00", "15:00", "16:00"

    ],

    "HOMS GATE": [

        "08:00", "09:00", "10:00", "11:00", "12:00",

        "13:00", "14:00", "15:00", "16:00", "17:00", "18:00"

    ],

    "Fit and Fix": [

        "08:00", "09:00", "10:00", "11:00", "12:00",

        "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00"

    ]

};

document.getElementById("breadcrumbGarage").innerText = garage;

document.getElementById("summaryGarage").innerText = garage;

if (garageImages[garage]) {

    document.getElementById("garageImage").src = garageImages[garage];

}

function loadTimes() {

    let timeSelect = document.getElementById("time");

    timeSelect.innerHTML = `<option value="">اختاري الوقت</option>`;

    let times = garageTimes[garage] || [];

    times.forEach(t => {

        timeSelect.innerHTML += `<option value="${t}">${t}</option>`;

    });

}

function checkDateAndLoadTimes() {

    let dateValue = document.getElementById("date").value;

    let msg = document.getElementById("msg");

    let timeSelect = document.getElementById("time");

    msg.innerText = "";

    if (!dateValue) {

        loadTimes();

        updateSummary();

        return;

    }

    let selectedDate = new Date(dateValue);

    let day = selectedDate.getDay();

    if (day === 5) {

        msg.innerText = "لا يمكن الحجز يوم الجمعة لأن الكراج مغلق.";

        timeSelect.innerHTML = `<option value="">الكراج مغلق</option>`;

        timeSelect.disabled = true;

    } else {

        timeSelect.disabled = false;

        loadTimes();

    }

    updateSummary();

}

function updateSummary() {

    document.getElementById("summaryService").innerText =

    document.getElementById("serviceType").value;

    document.getElementById("summaryCar").innerText =

    document.getElementById("carType").value || "-";

    document.getElementById("summaryPlate").innerText =

    document.getElementById("plateNumber").value || "-";

    document.getElementById("summaryDate").innerText =

    document.getElementById("date").value || "-";

    document.getElementById("summaryTime").innerText =

    document.getElementById("time").value || "-";

    document.getElementById("summaryPhone").innerText =

    document.getElementById("phone").value || "-";

    document.getElementById("summaryNotes").innerText =

    document.getElementById("notes").value || "-";

}

function confirmBooking() {

    let user = auth.currentUser;

    let serviceType = document.getElementById("serviceType").value;

    let carType = document.getElementById("carType").value;

    let plateNumber = document.getElementById("plateNumber").value;

    let date = document.getElementById("date").value;

    let time = document.getElementById("time").value;

    let phone = document.getElementById("phone").value;

    let notes = document.getElementById("notes").value;

    if (!user) {

        document.getElementById("msg").innerText = "يرجى تسجيل الدخول أولاً.";

        return;

    }

    if (!garage || garage === "Not selected") {

        document.getElementById("msg").innerText = "لم يتم اختيار كراج.";

        return;

    }

    if (carType === "" || plateNumber === "" || date === "" || time === "" || phone === "") {

        document.getElementById("msg").innerText = "يرجى تعبئة جميع البيانات المطلوبة.";

        return;

    }

    let selectedDate = new Date(date);

    if (selectedDate.getDay() === 5) {

        document.getElementById("msg").innerText = "لا يمكن الحجز يوم الجمعة لأن الكراج مغلق.";

        return;

    }

    db.collection("bookings").add({

        garage: garage,

        serviceType: serviceType,

        carType: carType,

        plateNumber: plateNumber,

        date: date,

        time: time,

        phone: phone,

        notes: notes,

        status: "Waiting",

        userEmail: user.email,

        userId: user.uid,

        createdAt: firebase.firestore.FieldValue.serverTimestamp()

    })

    .then(() => {

        window.location.href = "booking-success.html";

    })

    .catch((error) => {

        document.getElementById("msg").innerText = error.message;

    });

}

auth.onAuthStateChanged(function(user) {

    if (!user) {

        window.location.href = "login.html";

    }

});

loadTimes();

updateSummary();
</script>
</body>
</html>
