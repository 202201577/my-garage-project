<!DOCTYPE html>
<html>
<head>
<title>Booking - My Garage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f7fa;
    text-align: center;
}

.navbar {
    background: #1e293b;
    color: white;
    padding: 15px;
    font-size: 20px;
    text-align: center;
}

.container {
    margin-top: 50px;
}

.box {
    background: white;
    margin: auto;
    padding: 30px;
    width: 90%;
    max-width: 360px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.2s;
}

.box:hover {
    transform: scale(1.02);
}

h2 {
    margin-bottom: 20px;
}

#garageName {
    margin-bottom: 15px;
    font-size: 20px;
}

input {
    padding: 10px;
    margin: 10px;
    width: 90%;
    max-width: 250px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    border: none;
    background: #3b82f6;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    width: 90%;
    max-width: 220px;
}

button:hover {
    background: #2563eb;
}

.links {
    margin-top: 20px;
}

.links a,
#msg a {
    display: inline-block;
    margin: 8px;
    text-decoration: none;
    color: white;
    background: #10b981;
    padding: 10px 15px;
    border-radius: 8px;
}

#msg {
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="navbar">My Garage</div>

<div class="container">
    <div class="box">
        <h2>Booking Page</h2>
        <p id="garageName"></p>
        <input type="date" id="date"><br>
        <button type="button" onclick="confirmBooking()">Confirm Booking</button>

        <div class="links">
            <a href="index.html">Back to Home</a>
        </div>

        <p id="msg"></p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase.js"></script>

<script>
document.getElementById("garageName").innerText =
    "Garage: " + (localStorage.getItem("garage") || "Not selected");

function confirmBooking() {
    let date = document.getElementById("date").value;
    let garage = localStorage.getItem("garage");
    let user = auth.currentUser;

    if (!user) {
        document.getElementById("msg").innerText = "Please login first.";
        return;
    }

    if (!garage) {
        document.getElementById("msg").innerText = "No garage selected.";
        return;
    }

    if (date === "") {
        document.getElementById("msg").innerText = "Choose a date.";
        return;
    }

    db.collection("bookings").add({
        garage: garage,
        date: date,
        status: "Waiting",
        userEmail: user.email,
        userId: user.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(() => {
        window.location.href = "booking-success.html";
    })
    .catch((error) => {
        document.getElementById("msg").innerText = error.message;
    });
}

auth.onAuthStateChanged(function(user) {
    if (!user) {
        window.location.href = "login.html";
    }
});
</script>

</body>
</html>
