<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<title>الكراجات</title>

<style>

body{

    margin:0;
    background:#f8f9fa;
}

.title{
    text-align:center;
    padding:40px;
    font-size:40px;
    font-weight:bold;
}

.garages-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding:30px;
}

.card{
    width:300px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card-content h2{
    margin:0 0 10px;
}

.card-content p{
    color:#555;
}

.btn{
    display:inline-block;
    margin-top:15px;
    background:#dc2626;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="title">
الكراجات المتوفرة
</div>

<div class="garages-container">

</a>

</div>

</a>

</div>
