<!DOCTYPE html>
<html>
<head>
<title>My Garage</title>
<style>
       body {
           font-family: Arial, sans-serif;
           margin: 0;
           background: #f5f7fa;
           text-align: center;
       }
       .navbar {
           background: #1e293b;
           color: white;
           padding: 15px;
           font-size: 20px;
           text-align: center;
       }
       h1 {
           margin-top: 30px;
       }
       .search-box {
           margin: 20px;
       }
       input, select {
           padding: 10px;
           margin: 5px;
           width: 200px;
           border-radius: 8px;
           border: 1px solid #ccc;
       }
       button {
           padding: 10px 20px;
           border: none;
           background: #3b82f6;
           color: white;
           border-radius: 8px;
           cursor: pointer;
       }
       button:hover {
           background: #2563eb;
       }
       .garage {
           background: white;
           margin: 15px auto;
           padding: 20px;
           width: 320px;
           border-radius: 15px;
           box-shadow: 0 5px 15px rgba(0,0,0,0.1);
           transition: 0.2s;
       }
       .garage:hover {
           transform: scale(1.02);
       }
       .links {
           margin-top: 20px;
       }
       .links a {
           display: inline-block;
           text-decoration: none;
           color: white;
           background: #10b981;
           padding: 10px 15px;
           border-radius: 8px;
           margin: 5px;
       }
</style>
</head>
<body>
<div class="navbar">My Garage</div>
<h1>Garage Services</h1>
<div class="search-box">
<input type="text" id="search" placeholder="Search garage...">
<select id="filter">
<option value="all">All Services</option>
<option value="oil">Oil Change</option>
<option value="repair">Repair</option>
</select>
<button onclick="searchGarage()">Search</button>
</div>
<div id="results"></div>
<div class="links">
<a href="mybookings.html">My Bookings</a>
<a href="garage-dashboard.html">Garage Dashboard</a>
</div>
<script>
let garages = [
   {name: "Garage A", service: "oil"},
   {name: "Garage B", service: "repair"},
   {name: "Garage C", service: "oil"}
];
function searchGarage() {
   let text = document.getElementById("search").value.toLowerCase();
   let filter = document.getElementById("filter").value;
   let result = "";
   garages.forEach(g => {
       if (
           (filter === "all" || g.service === filter) &&
           (g.name.toLowerCase().includes(text) ||
            g.service.toLowerCase().includes(text))
       ) {
           result += `
<div class="garage">
<h3>${g.name}</h3>
<p>Service: ${g.service}</p>
<button onclick="book('${g.name}')">Book Now</button>
</div>
           `;
       }
   });
   if (result === "") {
       result = "<p>No garages found.</p>";
   }
   document.getElementById("results").innerHTML = result;
}
function book(name) {
   localStorage.setItem("garage", name);
   window.location.href = "booking.html";
}
window.onload = searchGarage;
</script>
</body>
</html>
