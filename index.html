<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Garage</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f8f9fa;
color:#0f172a;
}

.navbar{
background:white;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:999;
}

.logo{
width:150px;
}

.main-links{
display:flex;
gap:20px;
align-items:center;
}

.main-links a{
text-decoration:none;
color:#111827;
font-weight:bold;
}

.login-btn{
background:#dc2626;
color:white !important;
padding:12px 20px;
border-radius:10px;
}

.hero{
background:#07111f;
color:white;
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:42px;
}

.search-box{
background:white;
max-width:1100px;
margin:-50px auto 40px;
padding:25px;
border-radius:20px;
display:flex;
gap:15px;
flex-wrap:wrap;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.search-item{
flex:1;
min-width:200px;
}

.search-item select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
}

.search-btn{
background:#dc2626;
color:white;
border:none;
padding:15px 25px;
border-radius:12px;
cursor:pointer;
font-size:16px;
}

#results{
display:flex;
gap:20px;
padding:20px;
flex-wrap:wrap;
justify-content:center;
}

.garage{
background:white;
width:260px;
border-radius:18px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.garage img{
width:100%;
height:180px;
object-fit:cover;
}

.garage-info{
padding:18px;
}

.garage-info h3{
margin:0 0 10px;
}

.action-row{
display:flex;
gap:10px;
margin-top:15px;
}

.action-row a,
.action-row button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
text-align:center;
}

.map-btn{
background:white;
border:2px solid #2563eb !important;
color:#2563eb;
}

.book-btn{
background:#dc2626;
color:white;
}

.footer{
background:#07111f;
color:white;
text-align:center;
padding:30px;
margin-top:50px;
}

/* AI CHAT /

#ai-button{
position:fixed;
bottom:20px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
background:#dc2626;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
z-index:9999;
}

#ai-chat{
position:fixed;
bottom:100px;
right:20px;
width:360px;
height:520px;
background:#07111f;
border-radius:20px;
display:none;
flex-direction:column;
overflow:hidden;
z-index:9999;
}

#ai-header{
background:#dc2626;
padding:18px;
color:white;
font-weight:bold;
text-align:center;
}

#chat-box{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
color:white;
}

.user{
background:#dc2626;
padding:12px;
border-radius:12px;
margin:8px 0;
align-self:flex-end;
max-width:85%;
}

.ai{
background:#1e293b;
padding:12px;
border-radius:12px;
margin:8px 0;
align-self:flex-start;
max-width:85%;
line-height:1.7;
}

#ai-input-area{
display:flex;
padding:10px;
gap:10px;
background:#0f172a;
}

#userInput{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
}

#ai-input-area button{
background:#dc2626;
border:none;
padding:12px 18px;
border-radius:12px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">

<img src="logo.png" class="logo">

<div class="main-links">
<a href="#about">من نحن</a>
<a href="#contact">اتصل بنا</a>
<a href="garages.html" class="login-btn">احجز الآن</a>
</div>

</div>

<section class="hero">

<h1>
ابحث عن أفضل الكراجات
<br>
واحجز بسهولة
</h1>

<p>
خدمات صيانة وإصلاح السيارات في البحرين
</p>

</section>

<div class="search-box">

<div class="search-item">
<select id="filter">
<option value="all">اختر الخدمة</option>
<option value="repair">تصليح</option>
<option value="oil">تغيير زيت</option>
<option value="ac">مكيف</option>
</select>
</div>

<div class="search-item">
<select id="locationFilter">
<option value="">اختر المنطقة</option>
<option value="الهملة">الهملة</option>
<option value="توبلي">توبلي</option>
<option value="سلماباد">سلماباد</option>
</select>
</div>

<button onclick="searchGarage()" class="search-btn">
🔍 بحث
</button>

</div>

<div id="results"></div>

<div class="footer" id="contact">

<h3>اتصل بنا</h3>

<p>
+973 38202464
</p>

</div>

<!-- AI -->

<div id="ai-button" onclick="toggleAIChat()">
🤖
</div>

<div id="ai-chat">

<div id="ai-header">
Smart Garage Assistant
</div>

<div id="chat-box"></div>

<div id="ai-input-area">

<input id="userInput" placeholder="اكتب رسالتك">

<button onclick="sendMessage()">
إرسال
</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase.js"></script>

<script>

let currentUser = null;

let garages = [

{
name:"Blue Motors Auto Services",
service:"repair",
location:"سلماباد",
lat:26.1769,
lng:50.5477,
services:["ac","repair"],
rating:"4.2",
phone:"17877197",
image:"images(blue-motor).jpeg",
map:"https://maps.app.goo.gl/MA2C4r8D8p5S3L8d7?g_st=ic"
},

{
name:"BOSCH Service",
service:"oil",
location:"توبلي",
lat:26.1885,
lng:50.5538,
services:["oil"],
rating:"4.2",
phone:"17783888",
image:"images(BOSCH-Service).jpeg",
map:"https://maps.app.goo.gl/NEEPokUmA2KemgfH9?g_st=ic"
},

{
name:"Fit and Fix",
service:"repair",
location:"الهملة",
lat:26.1500,
lng:50.4815,
services:["ac","tires","repair"],
rating:"4.9",
phone:"37377196",
image:"images(Fit-and-fix).jpeg",
map:"https://maps.app.goo.gl/GP1DWyPEwJMD1Fdi9?g_st=ic"
}

];

function searchGarage(){

let location =
document.getElementById("locationFilter").value;

let service =
document.getElementById("filter").value;

let result = "";

garages.forEach(g => {

if(
(location === "" || g.location === location) &&
(service === "all" || g.service === service)
){

result +=  <div class="garage">  <img src="${g.image}">  <div class="garage-info">  <h3>${g.name}</h3>  <p>📍 ${g.location}</p>  <p>⭐ ${g.rating}</p>  <p>📞 ${g.phone}</p>  <div class="action-row">  <a href="${g.map}" target="_blank" class="map-btn"> الموقع </a>  <button class="book-btn"> احجز </button>  </div>  </div>  </div> ;

}

});

document.getElementById("results").innerHTML =
result ||
<p>😔 لا يوجد نتائج</p>;

}

function toggleAIChat(){

let chat =
document.getElementById("ai-chat");

chat.style.display =
chat.style.display === "flex"
? "none"
: "flex";

}

function getDistance(lat1,lng1,lat2,lng2){

let R = 6371;

let dLat = (lat2-lat1) * Math.PI / 180;

let dLng = (lng2-lng1) * Math.PI / 180;

let a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1Math.PI/180) *
Math.cos(lat2Math.PI/180) *
Math.sin(dLng/2) * Math.sin(dLng/2);

let c =
2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return R * c;

}

auth.onAuthStateChanged(function(user){

currentUser = user;

});

window.sendMessage = function(){

let input =
document.getElementById("userInput");

let chatBox =
document.getElementById("chat-box");

let msg =
input.value.trim();

if(msg === "") return;

chatBox.innerHTML += <div class="user">${msg}</div>;

input.value = "";

let text =
msg.toLowerCase();

text = text
.replaceAll("أ","ا")
.replaceAll("إ","ا")
.replaceAll("آ","ا");

/ EMAILS /

let adminEmails = [
"alhanoof.t29@gmail.com",
"anwaralhayki55@gmail.com"
];

let garageOwnerEmails = [
"bluemotors@mygarage.com",
"bosch@mygarage.com",
"fitandfix@mygarage.com"
];

let currentEmail =
currentUser?.email?.toLowerCase() || "";

let isAdmin =
adminEmails.includes(currentEmail);

let isGarageOwner =
garageOwnerEmails.includes(currentEmail);

/ GREETING /

if(
text.includes("سلام") ||
text.includes("هلا") ||
text.includes("مرحبا") ||
text.includes("hello")
){

let reply =
"وعليكم السلام 🌹 شلون أقدر أساعدك؟";

chatBox.innerHTML += <div class="ai">${reply}</div>;

chatBox.scrollTop =
chatBox.scrollHeight;

return;

}

/ ADMIN /

if(
text.includes("الارباح") ||
text.includes("ربح")
){

if(isAdmin){

let reply = 💰 الأرباح الحالية <br><br> 📈 إجمالي الأرباح: <b>4,250 د.ب</b> <br><br> 📅 عدد الحجوزات: <b>148</b>;

chatBox.innerHTML += <div class="ai">${reply}</div>;

}else{

chatBox.innerHTML += <div class="ai"> 🚫 هذي المعلومات للإدارة فقط </div>;

}

chatBox.scrollTop =
chatBox.scrollHeight;

return;

}

/ GARAGE OWNER /

if(
text.includes("الحجوزات") ||
text.includes("حجوزاتي")
){

if(isGarageOwner){

let reply = 📅 عندك 12 حجز جديد <br><br> ⭐ تقييم الكراج 4.8;

chatBox.innerHTML += <div class="ai">${reply}</div>;

}else{

chatBox.innerHTML += <div class="ai"> تقدر تشوف حجوزاتك من صفحة حجوزاتي 📅 </div>;

}

chatBox.scrollTop =
chatBox.scrollHeight;

return;

}

/ CONTACT /

if(
text.includes("رقم") ||
text.includes("اتصل")
){

let reply = 📞 خدمة العملاء <br> +973 38202464;

chatBox.innerHTML += <div class="ai">${reply}</div>;

chatBox.scrollTop =
chatBox.scrollHeight;

return;

}

/ SEARCH GARAGE /

if(
text.includes("كراج") ||
text.includes("garage")
){

let matched = garages[0];

let reply = 🚗 أنصحك بهذا الكراج:  <br><br>  <b>${matched.name}</b>  <br>  📍 ${matched.location}  <br>  📞 ${matched.phone}  <br><br>  <a href="${matched.map}" target="_blank" style="background:#dc2626;color:white;padding:10px 18px;border-radius:10px;text-decoration:none;display:inline-block;"> فتح الموقع </a>;

chatBox.innerHTML += <div class="ai">${reply}</div>;

chatBox.scrollTop =
chatBox.scrollHeight;

return;

}

/ UNKNOWN */

chatBox.innerHTML += <div class="ai"> 🌹 آسف ما فهمت طلبك </div>;

chatBox.scrollTop =
chatBox.scrollHeight;

};

</script>

</body>
</html>
