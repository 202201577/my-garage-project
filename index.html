<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<title>My Garage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f8f9fa;
color:#0f172a;
}

/* TOP BAR */

.top-bar{
background:#07111f;
color:white;
padding:10px 40px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
}

.top-bar a{
color:white;
text-decoration:none;
margin-right:15px;
}

/* NAVBAR */

.navbar{
background:white;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:999;
direction:ltr;
}

.logo{
width:150px;
}

.main-links{
display:flex;
gap:28px;
align-items:center;
direction:rtl;
}

.main-links a{
text-decoration:none;
color:#111827;
font-weight:bold;
font-size:16px;
transition:.3s;
}

.main-links a:hover{
color:#dc2626;
}

.login-btn{
background:#dc2626;
color:white !important;
padding:14px 24px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
}

.menu-icon{
font-size:34px;
cursor:pointer;
display:none;
}

/* SIDE MENU */

.side-menu{
position:fixed;
top:0;
right:-300px;
width:280px;
height:100%;
background:#07111f;
z-index:9999;
transition:.3s;
padding-top:30px;
text-align:right;
}

.side-menu.open{
right:0;
}

.side-menu img{
width:150px;
display:block;
margin:0 auto 30px;
background:white;
padding:8px;
border-radius:12px;
}

.side-menu a{
display:block;
color:white;
text-decoration:none;
padding:18px 30px;
font-size:18px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.close-btn{
position:absolute;
left:20px;
top:10px;
font-size:32px;
color:white;
cursor:pointer;
}

/* HERO */

.hero{
height:650px;

background:
linear-gradient(rgba(0,0,0,.60),rgba(0,0,0,.60)),
url("garage-bg.jpeg");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
padding:0 80px;

color:white;
}

.hero-content{
max-width:650px;
}

.hero h1{
font-size:65px;
line-height:1.4;
margin-bottom:20px;
}

.hero h1 span{
color:#ef4444;
}

.hero p{
font-size:22px;
line-height:2;
}

/* SEARCH */

.search-box{
background:white;
max-width:1100px;
margin:-70px auto 60px;
padding:25px;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
position:relative;
z-index:10;
flex-wrap:wrap;
}

input,
select{
padding:18px;
width:260px;
border:none;
background:#f3f4f6;
border-radius:12px;
font-size:16px;
}

button{
background:#dc2626;
color:white;
border:none;
padding:18px 35px;
border-radius:14px;
font-size:17px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#b91c1c;
}

/* TITLES */

.section-title{
text-align:center;
font-size:38px;
margin-top:40px;
}

/* RESULTS */

#results{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:40px;
}

/* GARAGE CARD */

.garage{
background:white;
width:320px;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,.08);
transition:.3s;
}

.garage:hover{
transform:translateY(-8px);
}

.garage-img{
width:100%;
height:220px;
object-fit:cover;
}

.garage-info{
padding:20px;
}

.garage-info h3{
font-size:26px;
margin-bottom:15px;
}

.garage-info p{
font-size:16px;
margin:10px 0;
}

.action-row{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.map-btn{
border:2px solid #2563eb;
color:#2563eb;
padding:12px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.book-btn{
background:#2563eb;
}

/* FOOTER */

.footer{
background:#07111f;
color:white;
text-align:center;
padding:30px;
margin-top:60px;
}

/* AI BUTTON */

#ai-button{
position:fixed;
bottom:20px;
left:20px;
width:75px;
height:75px;
border-radius:50%;
background:linear-gradient(135deg,#dc2626,#ef4444);
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
cursor:pointer;
z-index:9999;
box-shadow:0 0 25px rgba(0,0,0,.3);
}

#ai-chat{
position:fixed;
bottom:110px;
left:20px;
width:360px;
height:520px;
background:#07111f;
border-radius:20px;
display:none;
flex-direction:column;
overflow:hidden;
z-index:9999;
box-shadow:0 0 35px rgba(0,0,0,.4);
}

#ai-header{
background:#dc2626;
padding:18px;
color:white;
font-weight:bold;
text-align:center;
font-size:18px;
}

#chat-box{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
color:white;
}

.user{
background:#dc2626;
padding:12px;
border-radius:14px;
margin:10px 0;
max-width:85%;
align-self:flex-end;
}

.ai{
background:#1e293b;
padding:12px;
border-radius:14px;
margin:10px 0;
max-width:85%;
align-self:flex-start;
line-height:1.8;
}

#ai-input-area{
display:flex;
padding:12px;
gap:10px;
background:#0f172a;
}

#userInput{
flex:1;
width:auto;
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
}

/* MOBILE */

@media(max-width:900px){

.main-links{
display:none;
}

.menu-icon{
display:block;
}

.hero{
padding:0 30px;
height:550px;
}

.hero h1{
font-size:42px;
}

.hero p{
font-size:18px;
}

.logo{
width:120px;
}

.search-box{
margin-top:-50px;
padding:20px;
}

#ai-chat{
width:92%;
left:4%;
height:500px;
}

}

</style>
</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

<div>
📍 البحرين
</div>

<div>
📞 +973 38202464
</div>

</div>

<!-- NAVBAR -->

<div class="navbar">

<img src="logo.png" class="logo">

<div class="main-links">

<a href="#garages">الكراجات</a>
<a href="#about">من نحن</a>
<a href="#contact">اتصل بنا</a>
<a href="#garages" class="login-btn">
احجز خدمة الآن
</a>

</div>

<div class="menu-icon" onclick="openMenu()">
☰
</div>

</div>

<!-- SIDE MENU -->

<div id="sideMenu" class="side-menu">

<div class="close-btn" onclick="closeMenu()">×</div>

<img src="logo.png">

<a href="index.html">الرئيسية</a>
<a href="mybookings.html">حجوزاتي</a>
<a href="nearest-garage.html">أقرب كراج</a>
<a href="notifications.html">الإشعارات</a>
<a href="account.html">الحساب</a>
<a href="complaints.html">الشكاوي</a>

</div>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>
ابحث عن أفضل الكراجات
<br>
<span>واحجز بسهولة</span>
</h1>

<p>
خدمات صيانة وإصلاح السيارات في البحرين
بخطوات بسيطة وسريعة
</p>

</div>

</section>

<!-- SEARCH -->

<div class="search-box">

<input type="text" id="search" placeholder="ابحث عن كراج...">

<select id="filter">

<option value="all">كل الخدمات</option>
<option value="repair">تصليح</option>
<option value="oil">تغيير زيت</option>

</select>

<button onclick="searchGarage()">
ابحث الآن
</button>

</div>

<!-- RESULTS -->

<h2 class="section-title" id="garages">
الكراجات المتوفرة
</h2>

<div id="results"></div>

<!-- FOOTER -->

<div class="footer" id="contact">

<h3>اتصل بنا</h3>

<p dir="ltr">
+973 38202464
</p>

</div>

<!-- AI BUTTON -->

<div id="ai-button" onclick="toggleAIChat()">
🤖
</div>

<!-- AI CHAT -->

<div id="ai-chat">

<div id="ai-header">
Smart Garage Assistant
</div>

<div id="chat-box"></div>

<div id="ai-input-area">

<input id="userInput" placeholder="اكتب مشكلة سيارتك">

<button onclick="sendMessage()">
إرسال
</button>

</div>

</div>

<script>

function openMenu(){
document.getElementById("sideMenu").classList.add("open");
}

function closeMenu(){
document.getElementById("sideMenu").classList.remove("open");
}

function toggleAIChat(){

let chat = document.getElementById("ai-chat");

chat.style.display =
chat.style.display === "flex"
? "none"
: "flex";

}

</script>

</body>
</html>
