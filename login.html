<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - My Garage</title>
<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{

    background:#f4f4f4;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;

}

.login-wrapper{

    width:100%;

    max-width:1400px;

    background:white;

    border-radius:30px;

    overflow:hidden;

    display:flex;

    direction:ltr;

    box-shadow:0 10px 40px rgba(0,0,0,.1);

}

.image-side{

    width:50%;

    min-height:950px;

    background:

    linear-gradient(rgba(5,10,25,.45),rgba(5,10,25,.45)),

    url("garage-bg2.jpeg");

    background-size:cover;

    background-position:center;

    position:relative;

}

.overlay{

    position:absolute;

    top:70px;

    right:70px;

    color:white;

    direction:rtl;

}

.feature{display:flex;gap:18px;margin-bottom:40px;align-items:flex-start}

.feature-icon{

    width:60px;height:60px;border:2px solid #c4122f;border-radius:18px;

    display:flex;align-items:center;justify-content:center;font-size:28px;color:#ff2c55;

}

.feature h4{font-size:28px;margin-bottom:8px}

.feature p{font-size:18px;color:#ddd}

.login-side{

    width:50%;

    padding:60px;

    direction:rtl;

    display:flex;

    flex-direction:column;

    justify-content:center;

}

.logo{

    width:270px;

    display:block;

    margin:0 auto 35px;

}

h1{

    text-align:center;

    font-size:48px;

    margin-bottom:12px;

}

.subtitle{

    text-align:center;

    color:#777;

    font-size:19px;

    margin-bottom:35px;

}

.form-box{

    border:1px solid #eee;

    border-radius:24px;

    padding:35px;

}

.form-group{margin-bottom:22px}

label{display:block;margin-bottom:10px;font-weight:bold}

input[type="checkbox"]{

    width:18%;

    height:18px;

    accent-color:#c4122f;

    cursor:pointer;

}

.row{

    display:flex;

    justify-content:space-between;

    margin-bottom:25px;

}

.row a{color:#c4122f;text-decoration:none;font-weight:bold}

.login-btn{

    width:100%;

    height:60px;

    border:none;

    border-radius:16px;

    background:#c4122f;

    color:white;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;

}

.or{text-align:center;margin:25px 0;color:#888}

.google-btn{

    width:100%;

    height:60px;

    border:1px solid #ddd;

    border-radius:16px;

    background:white;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:12px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}

.google-btn img{width:28px}

.create-account{

    text-align:center;

    margin-top:28px;

}

.create-account a{color:#c4122f;text-decoration:none;font-weight:bold}

.contact{

    margin-top:40px;

    text-align:center;

}

.contact h3{font-size:24px;margin-bottom:12px}

.contact p{

    direction:ltr;

    unicode-bidi:bidi-override;

    font-size:20px;

    font-weight:bold;

    color:#444;

}

@media(max-width:900px){

    .login-wrapper{flex-direction:column}

    .image-side,.login-side{width:100%}

    .image-side{min-height:450px}

    .login-side{padding:30px 20px}

}
</style>
</head>
<body>
<div class="login-wrapper">
<div class="image-side">
</div>
</div>
</div>
<div class="login-side">
<img src="logo.png" class="logo">
<h1>تسجيل الدخول</h1>
<p class="subtitle">مرحباً بك مرة أخرى! الرجاء تسجيل الدخول لمتابعة حسابك</p>
<div class="form-box">
<div class="form-group">
<label>البريد الإلكتروني</label>
<input type="email" id="email" placeholder="ادخل بريدك الإلكتروني">
</div>
<div class="form-group">
<label>كلمة المرور</label>
<input type="password" id="password" placeholder="ادخل كلمة المرور">
</div>
<div class="row">
<label><input type="checkbox"> تذكرني</label>
<a href="#">نسيت كلمة المرور؟</a>
</div>
<button class="login-btn" onclick="login()">تسجيل الدخول</button>
<div class="or">أو</div>
<button class="google-btn" onclick="googleLogin()">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">

                تسجيل الدخول باستخدام Google
</button>
</div>
<div class="create-account">

            ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
</div>
<div class="contact">
<h3>اتصل بنا</h3>
<p>+973 38202464 | +973 37171721</p>
</div>
</div>
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase.js"></script>
<script>

function login(){

    let email = document.getElementById("email").value;

    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email,password)

    .then(() => window.location.href = "index.html")

    .catch(() => alert("البريد الإلكتروني أو كلمة المرور غير صحيحة"));

}

function googleLogin(){

    let provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)

    .then(() => window.location.href = "index.html")

    .catch((error) => alert(error.message));

}
</script>
</body>
</html>
