<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول - My Garage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    font-family:Arial,sans-serif;

    background:#f8fafc;

    overflow-x:hidden;

}

/* navbar */

.navbar{

    background:white;

    padding:18px 40px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 2px 10px rgba(0,0,0,.08);

    position:sticky;

    top:0;

    z-index:1000;

}

.logo{

    width:150px;

}

/* page */

.login-page{

    min-height:90vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px 20px;

    position:relative;

}

/* background */

.bg{

    position:absolute;

    inset:0;

    background:

    linear-gradient(rgba(7,17,31,.78),rgba(7,17,31,.78)),

    url("https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1400");

    background-size:cover;

    background-position:center;

}

/* card */

.login-card{

    position:relative;

    width:100%;

    max-width:460px;

    background:white;

    border-radius:28px;

    padding:45px 35px;

    box-shadow:0 15px 40px rgba(0,0,0,.18);

    text-align:center;

    z-index:2;

}

.icon{

    width:90px;

    height:90px;

    border-radius:50%;

    background:linear-gradient(135deg,#ef4444,#dc2626);

    display:flex;

    justify-content:center;

    align-items:center;

    margin:auto;

    margin-bottom:20px;

    color:white;

    font-size:40px;

}

.title{

    font-size:38px;

    font-weight:bold;

    margin-bottom:10px;

    color:#111827;

}

.subtitle{

    color:#6b7280;

    margin-bottom:35px;

    line-height:1.7;

}

/* inputs */

.input-group{

    margin-bottom:18px;

    text-align:right;

}

.input-group label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

    color:#374151;

}

.input-group input{

    width:100%;

    padding:15px;

    border:2px solid #e5e7eb;

    border-radius:14px;

    font-size:16px;

    transition:.2s;

}

.input-group input:focus{

    border-color:#ef4444;

    outline:none;

}

/* buttons */

.login-btn{

    width:100%;

    background:linear-gradient(135deg,#ef4444,#dc2626);

    color:white;

    border:none;

    padding:16px;

    border-radius:14px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    margin-top:10px;

    transition:.2s;

}

.login-btn:hover{

    transform:translateY(-2px);

    box-shadow:0 8px 20px rgba(239,68,68,.35);

}

.or{

    margin:25px 0;

    color:#9ca3af;

    font-weight:bold;

}

/* google */

.google-btn{

    width:100%;

    padding:15px;

    border:2px solid #e5e7eb;

    border-radius:14px;

    background:white;

    font-size:17px;

    cursor:pointer;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:12px;

    transition:.2s;

}

.google-btn:hover{

    background:#f9fafb;

}

.google-icon{

    width:24px;

}

/* links */

.links{

    margin-top:25px;

}

.links a{

    text-decoration:none;

    color:#dc2626;

    font-weight:bold;

    transition:.2s;

}

.links a:hover{

    opacity:.7;

}

/* error */

#error{

    margin-top:18px;

    color:#dc2626;

    font-weight:bold;

}

@media(max-width:600px){

    .login-card{

        padding:35px 25px;

    }

    .title{

        font-size:30px;

    }

}
</style>
</head>
<body>
<!-- navbar -->
<div class="navbar">
<img src="logo.png" class="logo">
</div>
<!-- page -->
<div class="login-page">
<div class="bg"></div>
<div class="login-card">
<div class="icon">🔐</div>
<h1 class="title">تسجيل الدخول</h1>
<p class="subtitle">

            سجل دخولك للوصول إلى حجوزاتك وإدارة حسابك في My Garage
</p>
<!-- email -->
<div class="input-group">
<label>البريد الإلكتروني</label>
<input type="email" id="email" placeholder="example@gmail.com">
</div>
<!-- password -->
<div class="input-group">
<label>كلمة المرور</label>
<input type="password" id="password" placeholder="••••••••">
</div>
<!-- login -->
<button class="login-btn" onclick="login()">

            تسجيل الدخول
</button>
<div class="or">OR</div>
<!-- google -->
<button class="google-btn" onclick="googleLogin()">
<img class="google-icon"

            src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">

            Sign in with Google
</button>
<!-- links -->
<div class="links">
<a href="register.html">

                إنشاء حساب جديد
</a>
</div>
<p id="error"></p>
</div>
</div>
<!-- firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase.js"></script>
<script>

/* login */

function login(){

    let email = document.getElementById("email").value;

    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email,password)

    .then(() => {

        window.location.href = "index.html";

    })

    .catch((error) => {

        document.getElementById("error").innerText =

        "البريد الإلكتروني أو كلمة المرور غير صحيحة";

    });

}

/* google */

function googleLogin(){

    let provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)

    .then(() => {

        window.location.href = "index.html";

    })

    .catch((error) => {

        document.getElementById("error").innerText =

        error.message;

    });

}

/* already login */

auth.onAuthStateChanged(function(user){

    if(user){

        window.location.href = "index.html";

    }

});
</script>
</body>
</html>
