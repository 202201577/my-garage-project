<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - My Garage</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.login-wrapper{
    width:100%;
    max-width:1400px;
    background:white;
    border-radius:30px;
    overflow:hidden;
    display:flex;
    direction:ltr;
    box-shadow:0 10px 40px rgba(0,0,0,.1);
}

.image-side{
    width:32%;
    min-height:950px;
    background-image:url("garage-bg2.jpeg");
    background-size:cover;
    background-position:78% center;
    background-repeat:no-repeat;
}

.login-side{
    width:50%;
    padding:60px;
    direction:rtl;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo{
    width:260px;
    display:block;
    margin:0 auto 25px;
}

h1{
    text-align:center;
    font-size:52px;
    margin-bottom:15px;
    color:#111;
}

.subtitle{
    text-align:center;
    color:#777;
    font-size:20px;
    margin-bottom:40px;
    line-height:1.8;
}

.form-box{
    border:1px solid #eee;
    border-radius:24px;
    padding:35px;
}

.form-group{
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:bold;
    color:#222;
}

input{
    width:100%;
    height:58px;
    border:1px solid #ddd;
    border-radius:15px;
    padding:0 18px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#c4122f;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.row a{
    color:#c4122f;
    text-decoration:none;
    font-weight:bold;
}

.checkbox-area{
    display:flex;
    align-items:center;
    gap:8px;
}

input[type="checkbox"]{
    width:18px;
    height:18px;
    accent-color:#c4122f;
    cursor:pointer;
}

.login-btn{
    width:100%;
    height:60px;
    border:none;
    border-radius:16px;
    background:#c4122f;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    background:#a90f28;
}

.or{
    text-align:center;
    margin:25px 0;
    color:#888;
    font-size:18px;
}

.google-btn{
    width:100%;
    height:60px;
    border:1px solid #ddd;
    border-radius:16px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.google-btn img{
    width:28px;
}

.create-account{
    text-align:center;
    margin-top:30px;
    font-size:18px;
}

.create-account a{
    color:#c4122f;
    text-decoration:none;
    font-weight:bold;
}

.contact{
    margin-top:45px;
    text-align:center;
}

.contact h3{
    font-size:26px;
    margin-bottom:14px;
    color:#222;
}

.contact p{
    direction:ltr;
    font-size:22px;
    font-weight:bold;
    color:#444;
}

/* MOBILE */

@media(max-width:768px){

    body{
        padding:0;
        background:
        linear-gradient(rgba(255,255,255,.88), rgba(255,255,255,.88)),
        url("garage-bg2.jpeg");
        background-size:cover;
        background-position:center;
        background-attachment:fixed;
    }

    .login-wrapper{
        width:100%;
        min-height:100vh;
        border-radius:0;
        display:flex;
        justify-content:center;
        align-items:center;
        background:transparent;
        box-shadow:none;
    }

    .image-side{
        display:none;
    }

    .login-side{
        width:100%;
        max-width:420px;
        padding:35px 22px;
        background:rgba(255,255,255,.92);
        border-radius:28px;
        margin:25px;
        box-shadow:0 10px 35px rgba(0,0,0,.12);
    }

    .logo{
        width:170px;
        margin:0 auto 18px;
    }

    h1{
        font-size:38px;
    }

    .subtitle{
        font-size:16px;
        margin-bottom:25px;
    }

    .form-box{
        padding:22px;
        border-radius:22px;
        background:white;
    }

    input{
        height:50px;
        font-size:14px;
    }

    .login-btn,
    .google-btn{
        height:50px;
        font-size:15px;
    }

    .google-btn img{
        width:22px;
    }

    .contact p{
        font-size:14px;
    }
}

</style>
</head>

<body>

<div class="login-wrapper">

    <!-- IMAGE -->
    <div class="image-side"></div>

    <!-- LOGIN -->
    <div class="login-side">

        <img src="logo.png" class="logo">

        <h1>تسجيل الدخول</h1>

        <p class="subtitle">
            مرحباً بك مرة أخرى! الرجاء تسجيل الدخول لمتابعة حسابك
        </p>

        <div class="form-box">

            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="ادخل بريدك الإلكتروني">
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="ادخل كلمة المرور">
            </div>

            <div class="row">

                <a href="#">نسيت كلمة المرور؟</a>

                <div class="checkbox-area">
                    <label style="margin:0;">تذكرني</label>
                    <input type="checkbox">
                </div>

            </div>

            <button class="login-btn" onclick="login()">
                تسجيل الدخول
            </button>

            <div class="or">أو</div>

            <button class="google-btn" onclick="googleLogin()">

                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">

                تسجيل الدخول باستخدام Google

            </button>

        </div>

        <div class="create-account">
            ليس لديك حساب؟
            <a href="register.html">إنشاء حساب جديد</a>
        </div>

        <div class="contact">

            <h3>اتصل بنا</h3>

            <p>
                +973 38202464 | +973 37171721
            </p>

        </div>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="firebase.js"></script>

<script>

function login(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email,password)

    .then(() => {

        window.location.href = "index.html";

    })

    .catch(() => {

        alert("البريد الإلكتروني أو كلمة المرور غير صحيحة");

    });

}

function googleLogin(){

    let provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)

    .then(() => {

        window.location.href = "index.html";

    })

    .catch((error) => {

        alert(error.message);

    });

}

</script>

</body>
</html>
