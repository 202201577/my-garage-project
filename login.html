<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - My Garage</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:'Cairo',sans-serif;

}

body{

    background:#f4f4f4;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;

}

.login-wrapper{

    width:100%;

    max-width:1400px;

    background:#fff;

    border-radius:30px;

    overflow:hidden;

    display:flex;

    box-shadow:0 10px 40px rgba(0,0,0,0.1);

}

/* left side */

.login-side{

    width:50%;

    padding:60px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    background:#fff;

}

.logo{

    width:260px;

    margin:0 auto 40px;

    display:block;

}

.login-title{

    text-align:center;

    margin-bottom:10px;

    font-size:52px;

    font-weight:800;

    color:#111827;

}

.login-subtitle{

    text-align:center;

    color:#777;

    font-size:20px;

    line-height:1.8;

    margin-bottom:40px;

}

/* form */

.form-box{

    background:#fff;

    border:1px solid #eee;

    border-radius:24px;

    padding:35px;

}

.form-group{

    margin-bottom:25px;

}

.form-group label{

    display:block;

    margin-bottom:10px;

    font-size:17px;

    font-weight:700;

    color:#222;

}

.form-group input{

    width:100%;

    height:60px;

    border:1px solid #ddd;

    border-radius:16px;

    padding:0 20px;

    font-size:16px;

    outline:none;

    transition:0.3s;

}

.form-group input:focus{

    border-color:#c4122f;

    box-shadow:0 0 0 4px rgba(196,18,47,0.1);

}

.row{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:25px;

    font-size:15px;

}

.row a{

    color:#c4122f;

    text-decoration:none;

    font-weight:700;

}

.login-btn{

    width:100%;

    height:60px;

    border:none;

    border-radius:16px;

    background:#c4122f;

    color:#fff;

    font-size:20px;

    font-weight:800;

    cursor:pointer;

    transition:0.3s;

}

.login-btn:hover{

    background:#a80f28;

}

.or{

    text-align:center;

    margin:25px 0;

    color:#888;

    font-weight:700;

}

.google-btn{

    width:100%;

    height:60px;

    border:1px solid #ddd;

    border-radius:16px;

    background:#fff;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:12px;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;

}

.google-btn:hover{

    background:#f8f8f8;

}

.google-btn img{

    width:28px;

}

.create-account{

    text-align:center;

    margin-top:30px;

    font-size:17px;

}

.create-account a{

    color:#c4122f;

    font-weight:800;

    text-decoration:none;

}

/* contact */

.contact{

    margin-top:45px;

    text-align:center;

}

.contact h3{

    margin-bottom:15px;

    font-size:24px;

    color:#111827;

}

.contact p{

    font-size:20px;

    color:#444;

    font-weight:700;

}

/* right side */

.image-side{

    width:50%;

    background:

    linear-gradient(rgba(5,10,25,0.45), rgba(5,10,25,0.45)),

    url('garage-bg.jpeg');

    background-size:cover;

    background-position:center;

    position:relative;

    min-height:1000px;

}

.overlay{

    position:absolute;

    top:70px;

    right:70px;

    color:#fff;

}

.feature{

    display:flex;

    align-items:flex-start;

    gap:18px;

    margin-bottom:40px;

}

.feature-icon{

    width:60px;

    height:60px;

    border:2px solid #c4122f;

    border-radius:18px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:28px;

    color:#ff2c55;

}

.feature h4{

    font-size:28px;

    margin-bottom:8px;

}

.feature p{

    font-size:18px;

    color:#ddd;

}

/* responsive */

@media(max-width:1100px){

    .login-wrapper{

        flex-direction:column;

    }

    .login-side,

    .image-side{

        width:100%;

    }

    .image-side{

        min-height:500px;

    }

}

@media(max-width:700px){

    body{

        padding:15px;

    }

    .login-side{

        padding:30px 20px;

    }

    .logo{

        width:190px;

    }

    .login-title{

        font-size:36px;

    }

    .login-subtitle{

        font-size:16px;

    }

    .contact p{

        font-size:16px;

    }

}
</style>
</head>
<body>
<div class="login-wrapper">
<!-- login side -->
<div class="login-side">
<img src="logo.png" class="logo">
<h1 class="login-title">تسجيل الدخول</h1>
<p class="login-subtitle">

            مرحباً بك مرة أخرى! الرجاء تسجيل الدخول لمتابعة حسابك
</p>
<div class="form-box">
<div class="form-group">
<label>البريد الإلكتروني</label>
<input type="email" id="email" placeholder="ادخل بريدك الإلكتروني">
</div>
<div class="form-group">
<label>كلمة المرور</label>
<input type="password" id="password" placeholder="ادخل كلمة المرور">
</div>
<div class="row">
<label>
<input type="checkbox">

                    تذكرني
</label>
<a href="#">نسيت كلمة المرور؟</a>
</div>
<button class="login-btn" onclick="login()">

                تسجيل الدخول
</button>
<div class="or">أو</div>
<button class="google-btn" onclick="googleLogin()">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">

                تسجيل الدخول باستخدام Google
</button>
</div>
<div class="create-account">

            ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
</div>
<div class="contact">
<h3>اتصل بنا</h3>
<p>

                +973 38202464 | +973 37171721
</p>
</div>
</div>
<!-- image side -->
<div class="image-side">
<div class="overlay">
<div class="feature">
<div class="feature-icon">✔</div>
<div>
<h4>آمن وموثوق</h4>
<p>حماية بياناتك مضمونة</p>
</div>
</div>
<div class="feature">
<div class="feature-icon">📅</div>
<div>
<h4>حجز سهل وسريع</h4>
<p>احجز موعدك في دقائق</p>
</div>
</div>
<div class="feature">
<div class="feature-icon">⭐</div>
<div>
<h4>أفضل الخدمات</h4>
<p>أعلى جودة بأفضل الأسعار</p>
</div>
</div>
</div>
</div>
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase.js"></script>
<script>

function login(){

    let email = document.getElementById("email").value;

    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email,password)

    .then(() => {

        window.location.href = "index.html";

    })

    .catch(() => {

        alert("البريد الإلكتروني أو كلمة المرور غير صحيحة");

    });

}

function googleLogin(){

    let provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)

    .then(() => {

        window.location.href = "index.html";

    })

    .catch((error) => {

        alert(error.message);

    });

}
</script>
</body>
</html>
