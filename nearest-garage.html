<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>أقرب كراج - My Garage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{

    margin:0;

    font-family:Arial,sans-serif;

    background:#f8fafc;

    color:#0f172a;

}

.navbar{

    background:white;

    padding:18px 25px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 2px 10px rgba(0,0,0,.08);

    direction:ltr;

}

.logo{width:140px}

.menu-btn{
   font-size:32px;
   cursor:pointer;
   color:#111827;
   font-weight:bold;
}

.side-menu{

    position:fixed;

    top:0;

    right:-290px;

    width:270px;

    height:100%;

    background:#07111f;

    color:white;

    z-index:1000;

    padding-top:35px;

    transition:.3s;

    text-align:right;

}

.side-menu.open{right:0}

.side-menu img{

    width:150px;

    display:block;

    margin:0 auto 25px;

    background:white;

    border-radius:12px;

    padding:6px;

}

.side-menu a{
 
    display:block;

    color:white;

    text-decoration:none;

    padding:16px 30px;

    font-size:18px;

    border-bottom:1px solid rgba(255,255,255,.08);

}
    .side-menu a:hover,

    .side-menu a.active{

    background:#dc2626;

}

.close-btn{

    position:absolute;

    left:20px;

    top:15px;

    font-size:28px;

    cursor:pointer;

    color:white;

}

.container{

    width:90%;

    max-width:1100px;

    margin:40px auto;

}

h1{

    text-align:center;

    font-size:38px;

}

.desc{

    text-align:center;

    color:#64748b;

    margin-bottom:30px;

}

.location-box,

.garage-card{

    background:white;

    border-radius:18px;

    padding:22px;

    margin-bottom:18px;

    box-shadow:0 8px 25px rgba(0,0,0,.08);

}

.btn{

    background:#c4122f;

    color:white;

    border:none;

    padding:14px 25px;

    border-radius:12px;

    font-size:16px;

    cursor:pointer;

}

.btn:hover{background:#a90f28}

.garage-card{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:20px;

}

.distance{

    font-size:24px;

    font-weight:bold;

    color:#c4122f;

}

.badge{

    background:#dcfce7;

    color:#15803d;

    padding:7px 14px;

    border-radius:20px;

    font-weight:bold;

}

.map-link{

    display:inline-block;

    margin-top:12px;

    text-decoration:none;

    color:white;

    background:#0f172a;

    padding:10px 18px;

    border-radius:10px;

}

@media(max-width:700px){

    .garage-card{

        flex-direction:column;

        text-align:center;

    }

}
</style>
</head>
<body>
<div class="navbar">
<img src="logo.png" class="logo">
<div class="menu-btn" onclick="toggleMenu()">&#9776;</div>
</div>
<div class="side-menu" id="sideMenu">
<div class="close-btn" onclick="toggleMenu()">×</div>
<img src="logo.png">
<a href="index.html">الرئيسية</a>

<a id="loginMenu" href="login.html">تسجيل دخول</a>
<a id="registerMenu" href="register.html">إنشاء حساب</a>

<a href="garages.html">الكراجات</a>
<a id="nearestMenu" href="nearest-garage.html" class="active">أقرب كراج</a>

<a id="myBookingsLink" href="mybookings.html" style="display:none;">حجوزاتي</a>
<a id="notificationsMenu" href="notifications.html" style="display:none;">الإشعارات</a>
<a id="accountMenu" href="account.html" style="display:none;">الحساب</a>
<a id="complaintsLink" href="complaints.html" style="display:none;">الشكاوي</a>

<a id="garageDashboardLink" href="garage-dashboard.html" style="display:none;">لوحة تحكم الكراج</a>
<a id="adminDashboardLink" href="admin-dashboard.html" style="display:none;">لوحة تحكم الأدمن</a>

<a href="index.html#contact">اتصل بنا</a>

<a id="logoutLink" href="#" onclick="logout()" style="display:none;">تسجيل خروج</a>
</div>
 
<div class="container">
<h1>أقرب كراج</h1>
<p class="desc">اعرف موقعك الحالي وشوف الكراجات مرتبة من الأقرب إلى الأبعد</p>
<div class="location-box">
<h2>موقعي الحالي</h2>
<p id="userLocation">اضغطي الزر عشان نحدد موقعك.</p>
<button class="btn" onclick="findNearestGarages()">تحديد موقعي وعرض الكراجات</button>
</div>
<div id="garageList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase.js"></script>
    
<script>

let garages = [

    {

        name:"Blue Motors Auto Services",

        area:"Salmabad",

        lat:26.1769,

        lng:50.5477,

        map:"https://maps.app.goo.gl/MA2C4r8D8p5S3L8d7?g_st=ic"

    },

    {

        name:"BOSCH Service",

        area:"Tubli",

        lat:26.1885,

        lng:50.5538,

        map:"https://maps.app.goo.gl/NEEPokUmA2KemgfH9?g_st=ic"

    },

    {

        name:"HOMS GATE",

        area:"Hamala",

        lat:26.1505,

        lng:50.4809,

        map:"https://maps.app.goo.gl/NMrPft3oPJFnvBcE9?g_st=ic"

    },

    {

        name:"Fit and Fix",

        area:"Hamala",

        lat:26.1500,

        lng:50.4815,

        map:"https://maps.app.goo.gl/GP1DWyPEwJMD1Fdi9?g_st=ic"

    }

];

function toggleMenu(){

    document.getElementById("sideMenu").classList.toggle("open");

}
    

function logout(){
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
}

function getDistance(lat1,lng1,lat2,lng2){

    let R = 6371;

    let dLat = (lat2-lat1) * Math.PI / 180;

    let dLng = (lng2-lng1) * Math.PI / 180;

    let a =

    Math.sin(dLat/2) * Math.sin(dLat/2) +

    Math.cos(lat1*Math.PI/180) *

    Math.cos(lat2*Math.PI/180) *

    Math.sin(dLng/2) * Math.sin(dLng/2);

    let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;

}

function findNearestGarages(){

    if(!navigator.geolocation){

        alert("المتصفح لا يدعم تحديد الموقع");

        return;

    }

    document.getElementById("userLocation").innerText = "جاري تحديد موقعك...";

    navigator.geolocation.getCurrentPosition(

        function(position){

            let userLat = position.coords.latitude;

            let userLng = position.coords.longitude;

            document.getElementById("userLocation").innerHTML =

            "📍 موقعك الحالي:<br>Latitude: " + userLat.toFixed(5) +

            "<br>Longitude: " + userLng.toFixed(5);

            let sortedGarages = garages.map(g => {

                return {

                    ...g,

                    distance:getDistance(userLat,userLng,g.lat,g.lng)

                };

            }).sort((a,b) => a.distance - b.distance);

            let output = "";

            sortedGarages.forEach((g,index) => {

                output += `
<div class="garage-card">
<div>

                        ${index === 0 ? '<span class="badge">الأقرب لك</span>' : ''}
<h2>${g.name}</h2>
<p>📍 المنطقة: ${g.area}</p>
<p>المسافة التقريبية:</p>
<div class="distance">${g.distance.toFixed(2)} كم</div>
<a class="map-link" href="${g.map}" target="_blank">فتح الموقع في الخريطة</a>
</div>
<div>

                        ${index + 1}
</div>
</div>

                `;

            });

            document.getElementById("garageList").innerHTML = output;

        },

        function(){

            document.getElementById("userLocation").innerText =

            "ما قدرنا نحدد موقعك. تأكدي إنك سمحتي للموقع باستخدام Location.";

        }

    );

}

firebase.auth().onAuthStateChanged(function(user){

    if(user){

        document.getElementById("loginMenu").style.display = "none";
        document.getElementById("registerMenu").style.display = "none";

        document.getElementById("myBookingsLink").style.display = "block";
        document.getElementById("notificationsMenu").style.display = "block";
        document.getElementById("accountMenu").style.display = "block";
        document.getElementById("complaintsLink").style.display = "block";
        document.getElementById("logoutLink").style.display = "block";

    } else {

        document.getElementById("loginMenu").style.display = "block";
        document.getElementById("registerMenu").style.display = "block";

        document.getElementById("myBookingsLink").style.display = "none";
        document.getElementById("notificationsMenu").style.display = "none";
        document.getElementById("accountMenu").style.display = "none";
        document.getElementById("complaintsLink").style.display = "none";
        document.getElementById("garageDashboardLink").style.display = "none";
        document.getElementById("adminDashboardLink").style.display = "none";
        document.getElementById("logoutLink").style.display = "none";

    }

});


</script>
</body>
</html>
