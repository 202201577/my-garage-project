<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الإشعارات - My Garage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a}
.navbar{background:white;padding:15px 35px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.08);position:sticky;top:0;z-index:1000;direction:ltr}
.logo{width:145px}
.menu-btn{font-size:32px;cursor:pointer;color:#111827;font-weight:bold}
.side-menu{position:fixed;top:0;right:-270px;width:250px;height:100%;background:#07111f;transition:.3s;z-index:2000;padding-top:70px;box-shadow:-5px 0 20px rgba(0,0,0,.25)}
.side-menu.open{right:0}
.close-btn{position:absolute;top:18px;left:22px;color:white;font-size:30px;cursor:pointer}
.side-menu img{width:140px;display:block;margin:0 auto 25px;background:white;padding:6px;border-radius:12px}
.side-menu a{display:block;color:white;text-decoration:none;padding:18px 25px;border-bottom:1px solid rgba(255,255,255,.08);font-size:18px;font-weight:bold}
.side-menu a:hover,.side-menu .active{background:#dc2626}
.page{width:90%;max-width:1050px;margin:45px auto}
.title{font-size:38px;margin-bottom:8px}
.breadcrumb{color:#6b7280;margin-bottom:25px}
.tabs{display:flex;gap:25px;flex-wrap:wrap;margin-bottom:25px}
.tab{padding:12px 18px;cursor:pointer;color:#6b7280;font-weight:bold;border-bottom:3px solid transparent}
.tab.active{color:#dc2626;border-bottom-color:#dc2626}
.actions{margin-bottom:20px}
.read-btn{background:white;border:1px solid #d1d5db;padding:12px 18px;border-radius:10px;font-weight:bold;cursor:pointer}
.notification{background:white;border-radius:18px;box-shadow:0 8px 25px rgba(0,0,0,.08);padding:22px;margin-bottom:18px;display:grid;grid-template-columns:90px 1fr 130px;gap:20px;align-items:center}
.icon-box{width:70px;height:70px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:34px}
.green{background:#dcfce7;color:#16a34a}
.red{background:#fee2e2;color:#dc2626}
.blue{background:#dbeafe;color:#2563eb}
.purple{background:#ede9fe;color:#7c3aed}
.orange{background:#ffedd5;color:#f97316}
.notif-title{font-size:22px;font-weight:bold;margin-bottom:8px}
.notif-text{color:#374151;line-height:1.8}
.tag{display:inline-block;padding:5px 10px;border-radius:10px;font-size:13px;font-weight:bold;margin-bottom:8px}
.time{text-align:center;color:#6b7280;border-right:1px solid #e5e7eb;padding-right:15px}
.details-link{color:#dc2626;font-weight:bold;text-decoration:none;display:inline-block;margin-top:10px}
.empty{background:white;padding:40px;text-align:center;border-radius:18px;box-shadow:0 8px 25px rgba(0,0,0,.08)}
@media(max-width:800px){
.notification{grid-template-columns:1fr;text-align:center}
.icon-box{margin:auto}
.time{border-right:none;padding-right:0}
.logo{width:120px}
}
</style>
</head>

<body>
<div class="navbar">
<img src="logo.png" class="logo">
<div class="menu-btn" onclick="toggleMenu()">&#9776;</div>
</div>

<div class="side-menu" id="sideMenu">
<div class="close-btn" onclick="toggleMenu()">×</div>
<img src="logo.png">
<a href="index.html">الرئيسية</a>
<a id="myBookingsMenu" href="mybookings.html">حجوزاتي</a>
<a id="nearestMenu" href="nearest-garage.html">أقرب كراج</a>
<a href="notifications.html" class="active">الإشعارات</a>
<a href="account.html">الحساب</a>
<a id="dashboardLink" href="garage-dashboard.html" style="display:none;">لوحة التحكم</a>
<a id="complaintsMenu" href="complaints.html">الشكاوي</a>
<a href="index.html#contact">اتصل بنا</a>
<a href="#" onclick="logout()">تسجيل خروج</a>
</div>

<div class="page">
<h1 class="title">الإشعارات</h1>
<div class="breadcrumb">الرئيسية › الإشعارات</div>

<div class="tabs">
<div class="tab active" onclick="setFilter('all', this)">الكل</div>
<div class="tab" onclick="setFilter('booking', this)">الحجوزات</div>
<div class="tab" onclick="setFilter('payment', this)">الدفع</div>
<div class="tab" onclick="setFilter('reminder', this)">التذكيرات</div>
<div class="tab" onclick="setFilter('smart', this)">اقتراح ذكي</div>
</div>

<div class="actions">
<button class="read-btn" onclick="markRead()">✓ تحديد كل الإشعارات كمقروءة</button>
</div>

<div id="notificationList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase.js"></script>

<script>
let notifications = [];
let currentFilter = "all";
let currentRole = "customer";
let currentEmail = "";

let adminEmails = [
    "alhanoof.t29@gmail.com",
    "anwaralhayki55@gmail.com"
];

let garageOwnerEmails = [
    "bluemotors@mygarage.com",
    "bosch@mygarage.com",
    "homsgate@mygarage.com",
    "fitandfix@mygarage.com"
];

function toggleMenu(){
    document.getElementById("sideMenu").classList.toggle("open");
}

function logout(){
    auth.signOut().then(() => {
        window.location.href = "login.html";
    });
}

function setFilter(filter, element){
    currentFilter = filter;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    element.classList.add("active");
    renderNotifications();
}

function markRead(){
    alert("تم تحديد الإشعارات كمقروءة");
}

function getNotificationStyle(type, title){
    if(type === "payment"){
        return {icon:"💰", color:"green", tag:"دفع"};
    }

    if(type === "reminder"){
        return {icon:"⏰", color:"blue", tag:"تذكير"};
    }

    if(type === "smart"){
        return {icon:"🤖", color:"orange", tag:"اقتراح ذكي"};
    }

    if((title || "").includes("رفض")){
        return {icon:"×", color:"red", tag:"حجز"};
    }

    if((title || "").includes("قبول")){
        return {icon:"✓", color:"green", tag:"حجز"};
    }

    return {icon:"📋", color:"orange", tag:"حجز"};
}

function getDetailsLink(type){
    if(currentRole === "garage"){
        return "garage-dashboard.html";
    }

    if(currentRole === "admin"){
        return "admin-dashboard.html";
    }

    if(type === "payment" || type === "booking" || type === "reminder"){
        return "mybookings.html";
    }

    return "index.html";
}

function isTomorrow(dateString){
    if(!dateString) return false;

    let today = new Date();
    let tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);

    let y = tomorrow.getFullYear();
    let m = String(tomorrow.getMonth() + 1).padStart(2, "0");
    let d = String(tomorrow.getDate()).padStart(2, "0");

    return dateString === `${y}-${m}-${d}`;
}

function addReminderNotifications(bookings){
    bookings.forEach(b => {

        if(b.status === "Rejected"){
            return;
        }

        if(isTomorrow(b.date)){
            notifications.push({
                type:"reminder",
                icon:"⏰",
                color:"blue",
                tag:"تذكير",
                title:"تذكير بالموعد",
                text:`لديك موعد في ${b.garage || "الكراج"} بتاريخ ${b.date || "-"} الساعة ${b.time || "-"}.`,
                time:"غداً",
                link:getDetailsLink("reminder")
            });
        }
    });
}

function renderNotifications(){
    let filtered = notifications.filter(n => currentFilter === "all" || n.type === currentFilter);
    let output = "";

    if(filtered.length === 0){
        output = `<div class="empty"><h2>لا توجد إشعارات</h2></div>`;
    } else {
        filtered.forEach(n => {
            output += `
            <div class="notification">
                <div class="icon-box ${n.color}">${n.icon}</div>
                <div>
                    <span class="tag ${n.color}">${n.tag}</span>
                    <div class="notif-title">${n.title}</div>
                    <div class="notif-text">${n.text}</div>
                    <a href="${n.link || getDetailsLink(n.type)}" class="details-link">عرض التفاصيل</a>
                </div>
                <div class="time">${n.time || "اليوم"}</div>
            </div>
            `;
        });
    }

    document.getElementById("notificationList").innerHTML = output;
}

function loadStoredNotifications(userId){
    db.collection("notifications")
    .where("userId", "==", userId)
    .onSnapshot((snapshot) => {

        notifications = [];

        snapshot.forEach(doc => {
            let n = doc.data();
            let style = getNotificationStyle(n.type, n.title);

            notifications.push({
                type:n.type || "booking",
                icon:style.icon,
                color:style.color,
                tag:style.tag,
                title:n.title || "-",
                text:n.message || "-",
                time:"اليوم",
                link:getDetailsLink(n.type)
            });
        });

        loadReminderSource();

    });
}

function loadReminderSource(){
    let query;

    if(currentRole === "garage"){
        query = db.collection("bookings").where("garageOwnerEmail", "==", currentEmail);
    } else if(currentRole === "customer"){
        query = db.collection("bookings").where("userEmail", "==", currentEmail);
    } else {
        renderNotifications();
        return;
    }

    query.onSnapshot((snapshot) => {
        let bookings = [];

        snapshot.forEach(doc => {
            bookings.push(doc.data());
        });

        notifications = notifications.filter(n => n.type !== "reminder");
        addReminderNotifications(bookings);

        if(currentRole === "customer"){
            notifications.push({
                type:"smart",
                icon:"🤖",
                color:"orange",
                tag:"اقتراح ذكي",
                title:"اقتراح ذكي من My Garage",
                text:"بناءً على آخر حجز لك، ننصحك بفحص الزيت والبطارية قريباً.",
                time:"اليوم",
                link:"index.html"
            });
        }

        renderNotifications();
    });
}

auth.onAuthStateChanged(function(user){
    if(user){
        currentEmail = user.email.toLowerCase();

        let isAdmin = adminEmails.includes(currentEmail);
        let isGarageOwner = garageOwnerEmails.includes(currentEmail);

        if(isAdmin){
            currentRole = "admin";

            document.getElementById("myBookingsMenu").style.display = "none";
            document.getElementById("nearestMenu").style.display = "none";
            document.getElementById("dashboardLink").style.display = "block";
            document.getElementById("dashboardLink").href = "admin-dashboard.html";
            document.getElementById("dashboardLink").innerText = "لوحة تحكم الأدمن";
        }
        else if(isGarageOwner){
            currentRole = "garage";

            document.getElementById("myBookingsMenu").style.display = "none";
            document.getElementById("nearestMenu").style.display = "none";
            document.getElementById("dashboardLink").style.display = "block";
            document.getElementById("dashboardLink").href = "garage-dashboard.html";
            document.getElementById("dashboardLink").innerText = "لوحة تحكم الكراج";
            document.getElementById("complaintsMenu").style.display = "none";
        }
        else{
            currentRole = "customer";
        }

        loadStoredNotifications(user.uid);

    } else {
        window.location.href = "login.html";
    }
});
</script>
</body>
</html>
